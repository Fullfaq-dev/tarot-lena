<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arcana AI — духовный наставник в Telegram</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #b88cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1a1430, var(--bg));
      color: var(--text);
      line-height: 1.6;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px 64px; text-align: center; }
    h1 { font-size: 2rem; margin: 0 0 12px; }
    p { color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 28px; }
    a.btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--surface);
    }
    a.btn.primary { background: var(--accent); color: #120a1f; border-color: transparent; }
    footer { margin-top: 48px; font-size: 0.9rem; color: var(--muted); }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔮 Arcana AI</h1>
    <p>AI-таролог и духовный наставник в Telegram: расклады, карта дня, персональный чат, анализ фото и голосовые ответы.</p>
    <div class="actions">
      <a class="btn primary" href="/legal/">Юридическая информация</a>
      <a class="btn" href="https://t.me/OnePage_support">Поддержка</a>
    </div>
    <footer>
      © Arcana AI · <a href="/legal/">Документы</a> · <a href="https://t.me/OnePage_support">Поддержка</a>
    </footer>
  </div>
</body>
</html>
