server {
    listen 80;
    server_name arcaneai.online www.arcaneai.online;
    client_max_body_size 20m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name arcaneai.online www.arcaneai.online;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/arcaneai.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcaneai.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /admin-api/ {
        proxy_pass http://api:8000/admin-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /callbacks/ {
        proxy_pass http://api:8000/callbacks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /telegram/ {
        proxy_pass http://api:8000/telegram/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    location /payment/ {
        proxy_pass http://api:8000/payment/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        root /usr/share/nginx/site;
        try_files /index.html =404;
    }

    location /legal/ {
        return 301 https://$host/$is_args$args;
    }

    location /legal {
        return 301 https://$host/$is_args$args;
    }

    location /panel/ {
        proxy_pass http://admin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /panel/;
    }

    location / {
        root /usr/share/nginx/site;
        try_files $uri =404;
    }
}
