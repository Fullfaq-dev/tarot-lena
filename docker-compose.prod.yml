services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    volumes:
      - media_data:/app/backend/static/generated
      - ./backend:/app/backend:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m app.workers.runner
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m app.bot.polling
    restart: unless-stopped
    volumes:
      - media_data:/app/backend/static/generated
      - ./backend:/app/backend:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile.prod
    image: tarot-lena-admin:latest
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./site:/usr/share/nginx/site:ro
      - ./deploy/nginx.active.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - admin

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tarot
      POSTGRES_USER: tarot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tarot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarot -d tarot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  certbot_www:
