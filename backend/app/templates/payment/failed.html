<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Оплата не завершена · Лея</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #0a080f;
      --bg1: #15101c;
      --card: rgba(24, 18, 30, 0.86);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3eef8;
      --muted: #b0a3bc;
      --accent: #f0abfc;
      --warn: #fca5a5;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 50% -5%, rgba(240, 171, 252, 0.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .card {
      width: min(100%, 440px);
      padding: 34px 26px 28px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      text-align: center;
    }
    .icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(252, 165, 165, 0.08);
      border: 1px solid rgba(252, 165, 165, 0.25);
      font-size: 2rem;
    }
    .brand {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      line-height: 1.2;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.65;
    }
    .actions { display: grid; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .btn-primary {
      color: #1a1020;
      background: linear-gradient(135deg, #f0abfc, #fda4af);
    }
    .btn-ghost {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }
    footer {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #8d8398;
    }
    footer a { color: #c4b5fd; text-decoration: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="icon" aria-hidden="true">✕</div>
      <div class="brand">Лея · Таро и Нумерология</div>
      <h1>Оплата не завершена</h1>
      <p>
        Платёж был отменён или не прошёл. С карты ничего не списали — попробуй ещё раз
        через меню продуктов в боте.
      </p>
      <div class="actions">
        {% if bot_url %}
        <a class="btn btn-primary" href="{{ bot_url }}">Вернуться в бота</a>
        {% endif %}
        <a class="btn btn-ghost" href="{{ support_url }}">Написать в поддержку</a>
      </div>
      <footer>
        <a href="{{ site_url }}/legal.html">Документы</a>
      </footer>
    </section>
  </main>
</body>
</html>
