name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Build admin panel
        working-directory: frontend-admin
        run: |
          npm ci
          npm run build

      - name: Copy admin build to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend-admin/dist/*"
          target: "/opt/tarot-lena/frontend-admin/dist"
          strip_components: 2
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          AI302_API_KEY: ${{ secrets.AI302_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PLATEGA_MERCHANT_ID: ${{ secrets.PLATEGA_MERCHANT_ID }}
          PLATEGA_API_KEY: ${{ secrets.PLATEGA_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,KIE_API_KEY,AI302_API_KEY,ELEVENLABS_API_KEY,PLATEGA_MERCHANT_ID,PLATEGA_API_KEY,VPS_HOST
          script: |
            set -euo pipefail
            cd /opt/tarot-lena
            VPS_IP="${VPS_HOST:-85.234.106.108}"
            PUBLIC_URL="http://${VPS_IP}"

            set_env() {
              local key="$1"
              local value="$2"
              value="$(printf '%s' "$value" | tr -d '\r\n')"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            set_env PAYMENTS_DEMO_MODE "1"
            set_env PUBLIC_BASE_URL "${PUBLIC_URL}"
            set_env PLATEGA_RETURN_URL "${PUBLIC_URL}/payment/success"
            set_env PLATEGA_FAILED_URL "${PUBLIC_URL}/payment/failed"
            set_env LEGAL_PAGE_URL "${PUBLIC_URL}/legal"
            set_env TELEGRAM_USE_POLLING "1"
            set_env HTTP_PORT "80"

            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
              set_env TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN}"
            fi

            if [ -n "${KIE_API_KEY:-}" ]; then
              set_env KIE_API_KEY "${KIE_API_KEY}"
            fi

            if [ -n "${ELEVENLABS_API_KEY:-}" ]; then
              set_env ELEVENLABS_API_KEY "${ELEVENLABS_API_KEY}"
              set_env ELEVENLABS_TTS_MODEL "eleven_turbo_v2_5"
              set_env ELEVENLABS_DEFAULT_VOICE_ID "hLjwV7lYzk15SWLUmhEH"
            fi

            if [ -n "${AI302_API_KEY:-}" ]; then
              set_env AI302_API_KEY "${AI302_API_KEY}"
              set_env AI302_BASE_URL "https://api.302.ai"
              set_env AI302_STT_MODEL "whisper-1"
            fi

            if [ -n "${PLATEGA_MERCHANT_ID:-}" ] && [ -n "${PLATEGA_API_KEY:-}" ]; then
              set_env PLATEGA_MERCHANT_ID "${PLATEGA_MERCHANT_ID}"
              set_env PLATEGA_API_KEY "${PLATEGA_API_KEY}"
              set_env PLATEGA_PAYMENT_METHOD "0"
              set_env PAYMENTS_DEMO_MODE "0"
            fi

            git fetch origin main
            git reset --hard origin/main
            VPS_IP="${VPS_HOST:-85.234.106.108}" HTTP_PORT=80 bash deploy/deploy.sh

            curl -sf "http://127.0.0.1/health" && echo " health OK"
