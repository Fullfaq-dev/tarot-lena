name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AI302_API_KEY: ${{ secrets.AI302_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: AI302_API_KEY
          script: |
            set -euo pipefail
            cd /opt/arcane-ai
            for kv in \
              "TELEGRAM_PLACEHOLDER_STICKER_ID=AAMCAgADGQEDNF_kaivgUF7mvhqlQ5dUeyQGm6a1Fz0AAkWbAAL4FmBJ3prL01LOBasBAAdtAAM8BA"; do
              key="${kv%%=*}"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${kv}|" .env
              else
                echo "$kv" >> .env
              fi
            done
            bash deploy/deploy.sh
            if [ -n "${AI302_API_KEY:-}" ]; then
              AI302_API_KEY="$(printf '%s' "$AI302_API_KEY" | tr -d '\r\n')"
              for kv in \
                "AI302_API_KEY=${AI302_API_KEY}" \
                "AI302_BASE_URL=https://api.302.ai" \
                "AI302_STT_MODEL=whisper-1"; do
                key="${kv%%=*}"
                if grep -q "^${key}=" .env; then
                  sed -i "s|^${key}=.*|${kv}|" .env
                else
                  echo "$kv" >> .env
                fi
              done
              docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps api
              docker compose -f docker-compose.prod.yml exec -T api python -c "from app.core.config import get_settings; k=get_settings().ai302_api_key; print('AI302 configured:', k[:7]+'...' if k and k!='replace-me' else 'MISSING')"
            fi
