name: Test 302 STT on VPS

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run 302 STT probe on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          AI302_API_KEY: ${{ secrets.AI302_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: AI302_API_KEY
          script: |
            set -euo pipefail
            cd /opt/arcane-ai
            AI302_API_KEY="$(printf '%s' "$AI302_API_KEY" | tr -d '\r\n')"
            HOST_MP3="/tmp/test-302-stt-host.mp3"
            if [ ! -s "$HOST_MP3" ]; then
              MP3=$(docker compose -f docker-compose.prod.yml exec -T api sh -lc 'ls -1t /app/backend/static/generated/*.mp3 2>/dev/null | head -1' || true)
              MP3=${MP3//$'\r'/}
              if [ -n "$MP3" ]; then
                docker compose -f docker-compose.prod.yml cp "api:${MP3}" "$HOST_MP3"
              fi
            fi
            if [ ! -s "$HOST_MP3" ]; then
              echo "No sample mp3 on VPS; run a voice message first or keep previous probe file"
              exit 1
            fi
            echo "key_prefix=${AI302_API_KEY:0:8}... mp3_bytes=$(wc -c < "$HOST_MP3")"
            CODE=$(curl -sS -o /tmp/302-resp.txt -w "%{http_code}" \
              -X POST "https://api.302.ai/v1/audio/transcriptions" \
              -H "Authorization: Bearer ${AI302_API_KEY}" \
              -H "Accept: application/json" \
              -F "file=@${HOST_MP3};type=audio/mpeg" \
              -F "model=whisper-1")
            echo "STATUS ${CODE} model=whisper-1 body=$(head -c 200 /tmp/302-resp.txt)"
            if [ "$CODE" != "200" ]; then
              echo "302 STT preflight FAILED (expected 200)"
              exit 1
            fi
            echo "302 STT preflight OK"
